<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 120" width="100%" height="100%">
  <defs>
    <!-- Google Sans / Comfortaa jaisa clean, modern, aur rounded font face -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Comfortaa:wght@500&amp;display=swap');
      .rounded-text {
        font-family: 'Comfortaa', 'Segoe UI', Roboto, sans-serif;
        font-size: 72px;
        fill: #FFFFFF;
        font-weight: 500;
        letter-spacing: -1px;
      }
    </style>
  </defs>
  
  <!-- Transparent Background (No BG) -->
  <rect width="100%" height="100%" fill="none" />
  
  <!-- "Sonix" Text Content -->
  <text x="50%" y="65%" dominant-baseline="middle" text-anchor="middle" class="rounded-text">Sonix</text>
</svg>
